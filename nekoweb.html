<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
  <meta http-equiv="refresh" content="3;url=https://sapphiku.nekoweb.org">
</head>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 2em;
    min-height: 100vh;
    margin: 0;
    padding: 2em;
    background: #1c042b;
    color: #c478ff;
    font-size: 1.5em;
    overflow-x: hidden;
  }

  main {
    max-width: 500px;
  }

  .x-img img {
    max-width: 100%;
    width: 550px;
    height: auto;
    display: block;
  }

  @media (max-width: 950px) {
    body {
      flex-direction: column;
      text-align: center;
      justify-content: center;
    }

    main {
      margin-top: 1em;
      order: 2;
    }
    
    aside {
      order: 1;
    }

    .x-img img {
      width: 300px;
    }
  }
</style>
<body>

<main>
  <div class="text">
    <h2>Onboard to Sapphiku's Archive</h2>
    <p>Please wait. If you aren't redirected, <a href="https://sapphiku.nekoweb.org">click here</a> to manually redirect.</p>
  </div>
</main>

<aside>
  <div class="x-img">
    <img src="https://splatoon.nintendo.com/base/_images/music/squid-sisters/hero-squid-sisters.png">
  </div>
</aside>

</body>
</html>
